kind = "web"
previewPath = "/"
title = "RSR Media"
version = "1.0.0"
id = "artifacts/rsr-media"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20572

[services.development]
run = "pnpm --filter @workspace/rsr-media run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rsr-media", "run", "build" ]
publicDir = "artifacts/rsr-media/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20572"
BASE_PATH = "/"
